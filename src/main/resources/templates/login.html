<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LTC Transfer | Sign in</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      footer {
        background-color: #e0f2eb;
      }

      .footer-icon {
        font-size: 1.5rem;
        color: #008950;
        margin-right: 15px;
      }

      .footer-icon:hover {
        color: #004d29;
      }

      .login-container {
        background: #e0f2ec;
        font-family: Arial, Helvetica, sans-serif;
        padding: 50px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .login-wrapper {
        background: white;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-container h2 {
        margin-bottom: 8px;
        color: #008952;
        text-align: center;
      }

      .login-form {
        text-align: left;
      }

      .login-form input {
        width: 100%;
        padding: 12px;
        margin: 8px 0 20px;
        border: 1px solid #e9e8e8;
        border-radius: 6px;
        font-size: 14px;
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        border: none;
        background: #1c8eeb;
        color: rgb(238, 235, 235);
        border-radius: 6px;
        cursor: pointer;
      }

      .error-text {
        color: red;
        font-size: 14px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark"
      style="background-color: #008940"
    >
      <div class="container">
        <a class="navbar-brand fw-bold">LTC Transfer</a>
      </div>
    </nav>

    <div class="login-wrapper">
      <div class="login-container">
        <h2>Login</h2>
        <br />

        <form action="/login" method="post" class="login-form">
          <label>Username / Email:</label><br />
          <input type="text" name="userid" required /><br />

          <label>Password:</label><br />
          <input type="password" name="password" required /><br /><br />

          <input type="submit" value="Login" class="login-btn" />
        </form>

        <p th:if="${error}" th:text="${error}" class="error-text"></p>

        <br /><br />
        <p class="login-footer">
          Don't have an account?
          <a href="#">Register</a>
        </p>
      </div>
    </div>

    <footer class="mt-5 py-4">
      <div class="container text-left">
        <div class="mb-3">
          <a href="#" class="footer-icon"><i class="bi bi-facebook"></i></a>
          <a href="#" class="footer-icon"><i class="bi bi-instagram"></i></a>
          <a href="#" class="footer-icon"><i class="bi bi-linkedin"></i></a>
        </div>

        <p class="mb-1">
          <a href="#" class="text-dark text-decoration-underline"
            >Privacy Policy</a
          >
        </p>
        <p class="mb-1">3500 Matcha Ave West,<br />MatchaLand, M2A 3T4</p>
        <p class="mb-0 text-center">
          &copy; 2025 LTC Transfer. All Rights Reserved.
        </p>
      </div>
    </footer>
  </body>
</html>
