<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LTC Transfer | Submit Transfer Request</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
        font-family: Arial, Helvetica, sans-serif;
      }

      .navbar-custom {
        background-color: #008940;
      }

      .page-card {
        max-width: 800px;
        margin: 50px auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        padding: 30px;
      }

      .page-title {
        color: #008952;
        font-weight: bold;
        margin-bottom: 20px;
      }

      .btn-green {
        background-color: #008952;
        color: white;
        border: none;
      }

      .btn-green:hover {
        background-color: #006b3f;
        color: white;
      }

      footer {
        background-color: #e0f2eb;
        margin-top: 50px;
      }

      .footer-icon {
        font-size: 1.5rem;
        color: #008950;
        margin-right: 15px;
      }

      .footer-icon:hover {
        color: #004d29;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">LTC Transfer</a>

        <div class="collapse navbar-collapse show">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="/hospital/dashboard"
                >Hospital Dashboard</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/hospital/transfer-form"
                >Transfer Request</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/logout">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="page-card">
        <h2 class="page-title">Submit Transfer Request</h2>

        <form action="/hospital/submit-transfer" method="POST">
          <div class="mb-3">
            <label for="facilityId" class="form-label">Select Facility</label>
            <select
              name="facilityId"
              id="facilityId"
              class="form-select"
              required
            >
              <option value="">Choose a facility</option>
              <option
                th:each="facility : ${facilities}"
                th:value="${facility.id}"
                th:text="${facility.name}"
              ></option>
            </select>
          </div>

          <div class="mb-3">
            <label for="patientName" class="form-label">Patient Name</label>
            <input
              type="text"
              name="patientName"
              id="patientName"
              class="form-control"
              required
            />
          </div>

          <div class="mb-3">
            <label for="patientCareNeeds" class="form-label"
              >Patient Care Needs</label
            >
            <textarea
              name="patientCareNeeds"
              id="patientCareNeeds"
              class="form-control"
              rows="4"
              required
            ></textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-green">Submit Transfer</button>
            <a href="/hospital/dashboard" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>

    <footer class="py-4">
      <div class="container text-left">
        <div class="mb-3">
          <a href="#" class="footer-icon"><i class="bi bi-facebook"></i></a>
          <a href="#" class="footer-icon"><i class="bi bi-instagram"></i></a>
          <a href="#" class="footer-icon"><i class="bi bi-linkedin"></i></a>
        </div>

        <p class="mb-1">
          <a href="#" class="text-dark text-decoration-underline"
            >Privacy Policy</a
          >
        </p>
        <p class="mb-1">
          3500 Matcha Ave West,<br />
          MatchaLand, M2A 3T4
        </p>

        <p class="mb-0 text-center">
          &copy; 2025 LTC Transfer. All Rights Reserved.
        </p>
      </div>
    </footer>
  </body>
</html>
