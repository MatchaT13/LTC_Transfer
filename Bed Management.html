<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bed Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #4facfe, #00f2fe);
    min-height: 100vh;
}

.navbar-custom {
    background-color: #0d6efd;
}

.dashboard-header {
    background-color: rgba(255, 255, 255, 0.95);
    padding: 25px;
    border-radius: 12px;
    margin-top: 20px;
}

.card-custom {
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.btn-main {
    background-color: #0d6efd;
    color: white;
}

.btn-main:hover {
    background-color: #084298;
    color: white;
}

.table thead {
    background-color: #0d6efd;
    color: white;
}

.status-badge {
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 0.9rem;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark navbar-custom">
    <div class="container">
        <span class="navbar-brand fw-bold">🏥 Bed Management</span>
    </div>
</nav>

<div class="container">

    <!-- Header -->
    <div class="dashboard-header">
        <h3 class="fw-bold text-primary">Bed Management</h3>
        <p class="mb-0">Manage beds, update status, and assign patients easily.</p>
    </div>

    <!-- Form -->
    <div class="card card-custom mt-4">
        <div class="card-body">
            <h5 class="mb-3 text-primary">Add / Update Bed</h5>

            <div class="row g-3">
                <div class="col-md-3">
                    <input type="number" id="id" class="form-control" placeholder="Bed ID">
                </div>

                <div class="col-md-3">
                    <select id="status" class="form-select">
                        <option>Available</option>
                        <option>Occupied</option>
                        <option>Reserved</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <input type="text" id="patient" class="form-control" placeholder="Patient Name">
                </div>

                <div class="col-md-3 d-grid">
                    <button class="btn btn-main" onclick="addBed()">Add Bed</button>
                </div>

                <div class="col-md-3 d-grid">
                    <button class="btn btn-secondary" onclick="updateBed()">Update Bed</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="card card-custom mt-4">
        <div class="card-body">
            <h5 class="mb-3 text-primary">Bed List</h5>

            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Status</th>
                        <th>Patient</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
let beds = JSON.parse(localStorage.getItem("beds")) || [
    { id: 1, status: "Available", patient: "" },
    { id: 2, status: "Occupied", patient: "John Doe" }
];

function getStatusBadge(status) {
    if (status === "Available") return `<span class="badge bg-success status-badge">Available</span>`;
    if (status === "Occupied") return `<span class="badge bg-danger status-badge">Occupied</span>`;
    return `<span class="badge bg-warning text-dark status-badge">Reserved</span>`;
}

function loadTable() {
    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    beds.forEach(bed => {
        table.innerHTML += `
            <tr onclick="fillForm(${bed.id})" style="cursor:pointer">
                <td>${bed.id}</td>
                <td>${getStatusBadge(bed.status)}</td>
                <td>${bed.patient}</td>
            </tr>
        `;
    });

    localStorage.setItem("beds", JSON.stringify(beds));
}

function addBed() {
    const id = parseInt(document.getElementById("id").value);
    const status = document.getElementById("status").value;
    let patient = document.getElementById("patient").value;

    if (!id) return alert("Enter a valid ID");

    if (beds.some(b => b.id === id)) {
        return alert("Bed ID already exists");
    }

    if (status === "Available") patient = "";

    beds.push({ id, status, patient });
    loadTable();
}

function updateBed() {
    const id = parseInt(document.getElementById("id").value);
    const status = document.getElementById("status").value;
    let patient = document.getElementById("patient").value;

    let found = false;

    beds.forEach(bed => {
        if (bed.id === id) {
            bed.status = status;
            bed.patient = (status === "Available") ? "" : patient;
            found = true;
        }
    });

    if (!found) return alert("Bed not found");

    loadTable();
}

function fillForm(id) {
    const bed = beds.find(b => b.id === id);
    document.getElementById("id").value = bed.id;
    document.getElementById("status").value = bed.status;
    document.getElementById("patient").value = bed.patient;
}

loadTable();
</script>

</body>
</html>
