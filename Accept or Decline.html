<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTC Transfer | Evaluation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        footer {
            background-color: #e0f2eb;
        }
        .breadcrumb-item a {
            color: #008940;
            text-decoration: none;
        }
        .patient-data-row {
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .patient-data-row:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#008940;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">LTC Transfer</a>
            <div class="collapse navbar-collapse show">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="LTC dashboard.html">Dashboard</a></li>
                        <li class="breadcrumb-item active">Transfer Request Evaluation</li>
                    </ol>
                </nav>

                <h2 class="fw-bold mb-4">Transfer Request Evaluation</h2>

                <div class="card mb-4">
                    <div class="card-body">
                        <form action="searchPatient" method="GET">
                            <label class="form-label fw-bold">Enter Patient ID</label>
                            <div class="row g-2">
                                <div class="col-md-9">
                                    <input type="text" name="patientID" class="form-control" placeholder="e.g. PT-99823" required>
                                </div>
                                <div class="col-md-3">
                                    <button type="submit" class="btn btn-primary w-100">Confirm</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card mb-5">
                    <div class="card-header text-white py-3" style="background-color:#008940">
                        <h5 class="mb-0 fw-bold text-white">Patient Information</h5>
                    </div>
                    <div class="card-body">
                        <div class="patient-data-row row">
                            <div class="col-sm-4 text-muted">Full Name:</div>
                            <div class="col-sm-8 fw-bold">Test Test</div>
                        </div>
                        <div class="patient-data-row row">
                            <div class="col-sm-4 text-muted">Age:</div>
                            <div class="col-sm-8 fw-bold">127</div>
                        </div>
                        <div class="patient-data-row row">
                            <div class="col-sm-4 text-muted">Required Bed Type:</div>
                            <div class="col-sm-8">
                                <span class="fw-bold text-dark">Specialized</span>
                            </div>
                        </div>
                        
                        <div class="mt-4 p-3 bg-light rounded border">
                            <div class="text-muted small mb-2">Additional Details:</div>
                            <div style="min-height: 50px;">
                                </div>
                        </div>

                        <form action="processTransfer" method="POST" class="mt-4">
                            <input type="hidden" name="patientID" value="PT-99823">
                            <div class="row g-3">
                                <div class="col-6">
                                    <button type="submit" name="decision" value="accept" class="btn btn-success w-100 py-2 fw-bold">Accept Patient</button>
                                </div>
                                <div class="col-6">
                                    <button type="submit" name="decision" value="decline" class="btn btn-danger w-100 py-2 fw-bold">Decline Request</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="mt-5 py-4">
        <div class="container text-center text-md-start">
            <div class="row">
                <div class="col-md-6">
                    <p class="mb-1 small">3500 Matcha Ave West, MatchaLand</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="mb-0 small text-muted">&copy; 2026 LTC Transfer. All Rights Reserved.</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
